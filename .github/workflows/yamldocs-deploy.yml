name: Yamldocs Deploy

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  deploy-yamldocs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build all projects
      run: dotnet build

    - name: Build documentation
      run: ./contrib/gensites.py

    - name: zip site
      run: zip -r site.zip ./outsite

    - uses: actions/upload-artifact@v7
      with:
        name: yamldocs-site
        path: site.zip

    - name: Install SSH key
      run: |
        mkdir -p ~/.ssh
        echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H notaslug.org >> ~/.ssh/known_hosts
      shell: bash
      env:
        PRIVATE_KEY: ${{ secrets.NOTASLUG_YAMLDOCS_KEY }}

    - name: Deploy site
      run: rsync -ravzc -e "ssh -i ~/.ssh/id_ed25519" ./outdir yamldocs@$DEPLOY_SERVER/site
      shell: bash
      env:
        DEPLOY_SERVER: notaslug.org:${{ secrets.NOTASLUG_YAMLDOCS_PATH }}
